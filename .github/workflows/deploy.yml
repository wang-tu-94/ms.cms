name: Build and Deploy Native Image to Docker Hub

on:
  push:
    branches:
      - master
jobs:
  test-build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 25 for testing
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: 'gradle'
      - name: 🧪 Run Unit Tests
        run: ./gradlew test --no-daemon

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build and push GraalVM image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ms.cms:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ms.cms:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ms.cms:buildcache,mode=max